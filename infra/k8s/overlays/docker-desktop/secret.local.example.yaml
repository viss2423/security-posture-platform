apiVersion: v1
kind: Secret
metadata:
  name: secplat-secrets
  namespace: secplat
  labels:
    app.kubernetes.io/part-of: secplat
type: Opaque
stringData:
  API_SECRET_KEY: "change-me"
  ADMIN_USERNAME: "admin"
  # Must be non-default when ENV=prod (default in secplat-config) or /auth/login returns 503.
  ADMIN_PASSWORD: "admin-local-strong"
  SCANNER_SERVICE_USERNAME: "scanner-service"
  SCANNER_SERVICE_PASSWORD: "scanner-local-strong"
  INGESTION_SERVICE_USERNAME: "ingestion-service"
  INGESTION_SERVICE_PASSWORD: "ingestion-local-strong"
  CORRELATOR_SERVICE_USERNAME: "correlator-service"
  CORRELATOR_SERVICE_PASSWORD: "correlator-local-strong"
  # Compose defaults from .env use host port 5433 for Postgres.
  API_POSTGRES_DSN: "postgresql+psycopg://secplat:secplat@host.docker.internal:5433/secplat"
  WORKER_POSTGRES_DSN: "postgresql://secplat:secplat@host.docker.internal:5433/secplat"
  CORRELATOR_USER: "correlator-service"
  CORRELATOR_PASSWORD: "correlator-local-strong"
  SLACK_WEBHOOK_URL: ""
  SLACK_SIGNING_SECRET: ""
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_WHATSAPP_FROM: ""
  WHATSAPP_ALERT_TO: ""
  JIRA_BASE_URL: ""
  JIRA_EMAIL: ""
  JIRA_API_TOKEN: ""
  JIRA_PROJECT_KEY: ""
  OIDC_ISSUER_URL: ""
  OIDC_CLIENT_ID: ""
  OIDC_CLIENT_SECRET: ""
  OIDC_REDIRECT_URI: ""
