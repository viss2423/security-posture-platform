apiVersion: apps/v1
kind: Deployment
metadata:
  name: secplat-correlator
  namespace: secplat
  labels:
    app.kubernetes.io/name: secplat-correlator
    app.kubernetes.io/part-of: secplat
    secplat-role: correlator
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: secplat-correlator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secplat-correlator
        app.kubernetes.io/part-of: secplat
        secplat-role: correlator
    spec:
      serviceAccountName: secplat-workload
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: correlator
          image: ghcr.io/your-org/secplat-correlator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: secplat-config
            - secretRef:
                name: secplat-secrets
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          resources:
            requests:
              cpu: 75m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
