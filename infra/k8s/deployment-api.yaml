apiVersion: apps/v1
kind: Deployment
metadata:
  name: secplat-api
  namespace: secplat
  labels:
    app.kubernetes.io/name: secplat-api
    app.kubernetes.io/part-of: secplat
    secplat-role: api
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: secplat-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secplat-api
        app.kubernetes.io/part-of: secplat
        secplat-role: api
    spec:
      serviceAccountName: secplat-workload
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/your-org/secplat-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: secplat-config
            - secretRef:
                name: secplat-secrets
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: secplat-secrets
                  key: API_POSTGRES_DSN
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
