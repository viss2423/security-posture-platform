apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: secplat-deriver-egress
  namespace: secplat
  labels:
    app.kubernetes.io/part-of: secplat
spec:
  podSelector:
    matchLabels:
      secplat-role: deriver
  policyTypes:
    - Egress
  egress:
    # Deriver only reads/writes OpenSearch.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 9200
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
