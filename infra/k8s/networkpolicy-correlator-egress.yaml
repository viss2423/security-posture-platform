apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: secplat-correlator-egress
  namespace: secplat
  labels:
    app.kubernetes.io/part-of: secplat
spec:
  podSelector:
    matchLabels:
      secplat-role: correlator
  policyTypes:
    - Egress
  egress:
    # Correlator consumes Redis and talks to API only.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 8000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
