apiVersion: 1

deleteDatasources:
  - name: OpenSearch (telemetry)
    orgId: 1

datasources:
  - name: OpenSearch (telemetry)
    uid: PSECPLATTELEMETRY
    type: grafana-opensearch-datasource
    access: proxy
    url: http://opensearch:9200
    isDefault: false
    editable: true
    jsonData:
      database: secplat-telemetry-all
      timeField: "@timestamp"
      version: "2.14.0"
      pplEnabled: false
